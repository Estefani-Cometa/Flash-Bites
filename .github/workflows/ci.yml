name: Flash-Bites CI - Tests & Validation

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main


jobs:

  backend-validation:

    name: Backend FastAPI Validation

    runs-on: ubuntu-latest


    steps:

      - name: Checkout repository
        uses: actions/checkout@v4


      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"


      - name: Install backend dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt


      - name: Verify FastAPI application import
        working-directory: backend
        env:
          PYTHONPATH: .
        run: |
          python -c "from app.main import app; print('FastAPI import OK')"


      - name: Run backend tests
        working-directory: backend
        env:
          PYTHONPATH: .
        run: |
          pytest tests/ -v --tb=short


      - name: Check Python code quality
        working-directory: backend
        run: |
          pip install flake8
          flake8 app/ \
          --count \
          --select=E9,F63,F7,F82 \
          --show-source \
          --statistics



  frontend-validation:

    name: Frontend React/Vite Validation

    runs-on: ubuntu-latest


    steps:

      - name: Checkout repository
        uses: actions/checkout@v4


      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json


      - name: Install frontend dependencies
        working-directory: frontend
        run: |
          npm ci


      - name: Build frontend
        working-directory: frontend
        env:
          CI: false
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
        run: |
          npm run build


      - name: Verify frontend build
        run: |
          if [ ! -d "frontend/dist" ]; then
            echo "Frontend build directory not found"
            exit 1
          fi

          echo "Frontend build completed successfully"